<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Agent_City</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #071120;
        color: #d7e4ff;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        border: 1px solid #26456b;
        border-radius: 12px;
        background: #0d1f34;
        padding: 18px 20px;
        max-width: 560px;
        line-height: 1.5;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      p {
        margin: 0;
        color: #b4c6e9;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Agent_City Desktop Shell</h1>
      <p>
        The Tauri shell is active. The workbench UI is loaded from the local Next.js service
        started by the shell runtime.
      </p>
    </div>
  </body>
</html>
